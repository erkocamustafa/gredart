<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GredArt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #12152b;
      --surface: #1f2342;
      --surface-2: #262b4d;
      --border: #313869;
      --accent: #43e8d8;
      --accent-2: #4ade80;
      --text: #eaeefb;
      --muted: #8b93b8;
      --danger: #ff6b6b;
      --warn: #f7a23b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(1000px 600px at 50% -15%, rgba(67,232,216,0.10), transparent 60%),
        radial-gradient(800px 600px at 100% 120%, rgba(74,222,128,0.08), transparent 55%);
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      padding: 20px; gap: 16px;
      overscroll-behavior: none;
    }
    .header { text-align: center; }
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    #subtitle { font-size: 11px; color: var(--accent); letter-spacing: 4px; font-weight: 600; opacity: 0.7; margin-top: 4px; }

    #main { display: flex; flex-direction: column; gap: 18px; width: 100%; max-width: 1000px; align-items: center; }
    @media (min-width: 900px) { #main { flex-direction: row; align-items: flex-start; justify-content: center; } }

    #board-section {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent), var(--surface);
      padding: 20px; border-radius: 18px;
      box-shadow: 0 18px 44px rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      width: 100%; max-width: 620px; overflow: hidden;
    }
    #board-section:fullscreen { max-width: 100vw; height: 100vh; border-radius: 0; border: none; justify-content: center; background: var(--bg); }
    #board-section:fullscreen #canvas-wrapper { max-width: 80vh; }

    #game-status-bar {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      display: flex; flex-direction: row; justify-content: space-between; align-items: center; gap: 10px;
    }
    #game-message { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; }
    #game-word-highlight { color: var(--accent); font-size: 14px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    #game-timer { font-family: 'Sora', monospace; font-size: 18px; font-weight: 700; color: var(--accent-2); letter-spacing: 1px; }

    .action-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2)); color: #0c1024; border: none;
      padding: 12px 18px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 13px;
      font-family: inherit; transition: transform 0.08s, opacity 0.2s; width: 100%;
    }
    .action-btn.secondary { background: var(--warn); color: #1c1304; }
    .action-btn.ghost { background: var(--surface-2); color: var(--accent); border: 1px solid var(--border); }
    .action-btn:hover { opacity: 0.92; }
    .action-btn:active { transform: scale(0.97); }
    .action-btn svg { width: 15px; height: 15px; }
    .icon-btn {
      background: none; border: none; color: var(--accent); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; padding: 4px; transition: transform 0.1s, opacity 0.2s;
    }
    .icon-btn:hover { opacity: 0.8; }
    .icon-btn svg { width: 20px; height: 20px; }

    #canvas-wrapper {
      position: relative; width: 100%; max-width: 576px; aspect-ratio: 1 / 1;
      border-radius: 6px; overflow: hidden; touch-action: none;
      background-color: #fff; box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.5);
      user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    }
    #canvas-pan { position: absolute; inset: 0; transform-origin: 0 0; will-change: transform; }
    canvas { width: 100%; height: 100%; display: block; cursor: crosshair; image-rendering: pixelated; }
    #canvas-lock-overlay { position: absolute; inset: 0; background: rgba(18,21,43,0.45); z-index: 10; display: block; cursor: not-allowed; border-radius: 6px; }
    #hover-cursor { position: absolute; pointer-events: none; border: 2px solid rgba(255,255,255,0.85); border-radius: 2px; display: none; z-index: 5; box-shadow: 0 0 6px rgba(0,0,0,0.5); }
    #zoom-controls { position: absolute; right: 8px; bottom: 8px; z-index: 30; display: flex; flex-direction: column; gap: 6px; }
    .zoom-btn {
      width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--border);
      background: rgba(18,21,43,0.78); color: var(--accent); display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      transition: opacity 0.2s, transform 0.08s; padding: 0;
    }
    .zoom-btn:active { transform: scale(0.92); }
    .zoom-btn svg { width: 18px; height: 18px; }
    #zoom-reset { display: none; font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 700; }

    #palette { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; max-width: 576px; }
    .color-btn { width: 30px; height: 30px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.25); transition: transform 0.1s; }
    .color-btn:hover { transform: scale(1.1); }
    .color-btn.selected { border-color: var(--accent); transform: scale(1.12); box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--accent); }
    #eraser-btn {
      width: 30px; height: 30px; border-radius: 8px; border: 2px solid transparent; cursor: pointer;
      background: var(--surface-2); display: flex; align-items: center; justify-content: center; color: var(--text); transition: transform 0.1s;
    }
    #eraser-btn svg { width: 16px; height: 16px; }
    #eraser-btn.selected { border-color: var(--accent); transform: scale(1.12); box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--accent); }

    #side-panel { width: 100%; max-width: 620px; display: flex; flex-direction: column; gap: 16px; }
    @media (min-width: 900px) { #side-panel { width: 270px; max-width: 270px; } }
    .panel-card { background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent), var(--surface); border-radius: 16px; padding: 18px; border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .panel-title { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }

    #room-name { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
    #room-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }

    #cooldown-wrap { display: flex; flex-direction: column; gap: 8px; }
    #cooldown-top { display: flex; justify-content: space-between; align-items: center; }
    #cooldown-status { font-size: 13px; font-weight: 700; color: var(--accent-2); }
    #cooldown-timer-text { font-size: 13px; color: var(--muted); }
    #cooldown-bar-bg { width: 100%; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    #cooldown-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }

    #players-list { display: flex; flex-direction: column; gap: 12px; }
    .player-row { display: flex; align-items: center; gap: 10px; }
    .player-avatar { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
    .player-info { flex: 1; overflow: hidden; }
    .player-name { font-size: 14px; font-weight: 600; color: var(--text); display: flex; justify-content: space-between; align-items: center; white-space: nowrap; text-overflow: ellipsis; }
    .player-pixels { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .player-bar-bg { width: 100%; height: 4px; background: var(--bg); border-radius: 2px; margin-top: 4px; overflow: hidden; }
    .player-bar { height: 100%; transition: width 0.3s ease; }
    .host-badge { color: var(--warn); display: inline-flex; vertical-align: middle; margin-left: 4px; }
    .host-badge svg { width: 13px; height: 13px; }

    #name-modal { display: none; position: fixed; inset: 0; background: rgba(18,21,43,0.85); backdrop-filter: blur(6px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: var(--surface); border: 1px solid var(--accent); border-radius: 20px; padding: 32px; width: 360px; max-width: 100%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .modal-content h2 { font-family: 'Sora', sans-serif; color: #fff; font-size: 22px; margin-bottom: 8px; }
    .modal-content p { color: var(--accent); font-size: 13px; margin-bottom: 22px; opacity: 0.85; }
    .modal-content input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; font-size: 16px; text-align: center; margin-bottom: 18px; outline: none; font-family: inherit; }
    .modal-content input:focus { border-color: var(--accent); }

    #chat-card { display: flex; flex-direction: column; gap: 10px; }
    #chatBox { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: var(--border) transparent; padding-right: 4px; }
    .chat-msg { font-size: 12.5px; color: var(--text); line-height: 1.4; word-break: break-word; }
    .chat-msg .chat-name { font-weight: 700; margin-right: 4px; }
    .chat-msg.mine .chat-name { color: var(--accent); }
    .chat-msg:not(.mine) .chat-name { color: #9b8cff; }
    #chat-input-row { display: flex; gap: 6px; }
    #chatInput { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px; color: white; font-size: 13px; outline: none; font-family: inherit; }
    #chatInput:focus { border-color: var(--accent); }
    #chatSendBtn { background: linear-gradient(120deg, var(--accent), var(--accent-2)); color: #0c1024; border: none; border-radius: 10px; width: 36px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
    #chatSendBtn:hover { opacity: 0.85; }
    #chatSendBtn svg { width: 16px; height: 16px; }

    #spectator-banner { display: none; width: 100%; background: linear-gradient(120deg, var(--warn), #ffd166); color: #1c1304; border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 700; text-align: center; display: none; align-items: center; justify-content: center; gap: 8px; }
    #spectator-banner svg { width: 16px; height: 16px; }
    #spectator-count-badge { font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px; letter-spacing: 0.5px; }
    #spectator-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .spectator-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .spectator-name { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .spectator-name svg { width: 14px; height: 14px; }
    .promote-btn { background: var(--surface-2); color: var(--accent); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; transition: background 0.2s; display: inline-flex; align-items: center; gap: 5px; }
    .promote-btn svg { width: 11px; height: 11px; }
    .promote-btn:hover { background: #2f366a; }

    #promotion-toggle-row { display: none; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    #promotion-toggle-label { font-size: 12px; color: var(--muted); }
    .toggle-switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--surface-2); border-radius: 22px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }

    #slot-toast { display: none; position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: linear-gradient(120deg, var(--accent), var(--accent-2)); color: #0c1024; border-radius: 14px; padding: 14px 22px; font-size: 14px; font-weight: 700; z-index: 500; box-shadow: 0 12px 36px rgba(0,0,0,0.4); flex-direction: column; align-items: center; gap: 10px; text-align: center; max-width: 90vw; }
    #slot-toast.visible { display: flex; }
    .toast-actions { display: flex; gap: 8px; }
    .toast-btn { border: none; border-radius: 9px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
    .toast-btn:hover { opacity: 0.85; }
    .toast-accept { background: #0c1024; color: var(--accent); }
    .toast-decline { background: rgba(12,16,36,0.35); color: #0c1024; }

    .room-gallery-link { display: inline-flex; align-items: center; gap: 7px; justify-content: center; width: 100%; margin-top: 10px; font-size: 12px; color: var(--accent); opacity: 0.8; letter-spacing: 0.5px; font-weight: 600; text-decoration: none; }
    .room-gallery-link:hover { opacity: 1; }
    .room-gallery-link svg { width: 14px; height: 14px; }
    #mute-btn { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; color: var(--accent); cursor: pointer; z-index: 400; transition: border-color 0.2s; }
    #mute-btn:hover { border-color: var(--accent); }
    #mute-btn svg { width: 20px; height: 20px; }

    /* ===== Mobil optimizasyon ===== */
    @media (max-width: 640px) {
      body { padding: 8px; gap: 10px; }
      h1 { font-size: 22px; }
      #subtitle { letter-spacing: 3px; margin-top: 2px; font-size: 10px; }
      #main { gap: 10px; }
      #board-section { padding: 10px; border-radius: 14px; gap: 12px; max-width: 100%; }
      #canvas-wrapper { max-width: none; }
      #game-status-bar { padding: 8px 10px; }
      #game-message { font-size: 12px; }
      #game-timer { font-size: 16px; }
      #palette { gap: 8px; max-width: 100%; }
      .color-btn, #eraser-btn { width: 36px; height: 36px; }
      #side-panel { gap: 12px; max-width: 100%; }
      .panel-card { padding: 14px; }
      #chatBox { max-height: 150px; }
      #mute-btn { width: 40px; height: 40px; bottom: 12px; right: 12px; }
      .zoom-btn { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>GredArt</h1>
    <div id="subtitle" data-i18n="tagline">BERABER ÇİZ</div>
  </div>

  <div id="main">
    <div id="board-section">
      <div id="game-status-bar">
        <div id="game-message" data-i18n="waiting_players">Oyuncu bekleniyor…</div>

        <div id="host-top-controls" style="display:none; gap:8px;">
          <button class="action-btn" style="padding:8px 12px; width:auto;" onclick="startGame('timed')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/></svg>
            <span data-i18n="timed">Süreli</span>
          </button>
          <button class="action-btn secondary" style="padding:8px 12px; width:auto;" onclick="startGame('free')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 0 20 2 2 0 0 0 2-2v-1a2 2 0 0 1 2-2h1a3 3 0 0 0 3-3 9 9 0 0 0-9-9Z"/><circle cx="7.5" cy="10.5" r="1.2" fill="currentColor"/><circle cx="12" cy="7.5" r="1.2" fill="currentColor"/><circle cx="16.5" cy="10.5" r="1.2" fill="currentColor"/></svg>
            <span data-i18n="free">Serbest</span>
          </button>
        </div>

        <div id="host-finish-controls" style="display:none; gap:8px;">
          <button id="finish-btn" class="action-btn secondary" style="padding:8px 12px; width:auto;" onclick="finishRoom()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            <span data-i18n="finish">Bitir</span>
          </button>
        </div>

        <div id="end-top-controls" style="display:none; gap:8px;">
          <button class="action-btn ghost" style="padding:8px 12px; width:auto;" onclick="downloadCanvas()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            <span data-i18n="download">İndir</span>
          </button>
          <button id="replay-btn" class="action-btn secondary" style="padding:8px 12px; width:auto; display:none;" onclick="resetRoom()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8m0-5v5h5"/></svg>
            <span data-i18n="new_round">Yeni Tur</span>
          </button>
        </div>

        <div style="display:flex; align-items:center; gap:12px;">
          <div id="game-timer" style="display:none;"></div>
          <button id="fullscreen-btn" class="icon-btn" title="Fullscreen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
          </button>
        </div>
      </div>

      <div id="spectator-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        <span data-i18n="spectator_mode">İZLEYİCİ MODUNDASIN — Oda dolu</span>
      </div>
      <div id="canvas-wrapper">
        <div id="canvas-pan">
          <canvas id="canvas"></canvas>
          <div id="hover-cursor"></div>
        </div>
        <div id="canvas-lock-overlay"></div>
        <div id="zoom-controls">
          <button id="zoom-in" class="zoom-btn" title="Yakınlaştır" aria-label="Yakınlaştır">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M11 8v6M8 11h6m6 9-3.5-3.5"/></svg>
          </button>
          <button id="zoom-reset" class="zoom-btn" title="Yakınlaştırmayı sıfırla" aria-label="Sıfırla">1:1</button>
        </div>
      </div>

      <div id="palette"></div>
    </div>

    <div id="side-panel">
      <div class="panel-card">
        <div class="panel-title" data-i18n="brush_cooldown">FIRÇA BEKLEMESİ</div>
        <div id="cooldown-wrap">
          <div id="cooldown-top">
            <span id="cooldown-status" data-i18n="locked">KİLİTLİ</span>
            <span id="cooldown-timer-text"></span>
          </div>
          <div id="cooldown-bar-bg"><div id="cooldown-bar"></div></div>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title" data-i18n="players">KATILIMCILAR</div>
        <div id="players-list"></div>

        <div id="spectators-section" style="display:none; margin-top:12px;">
          <div class="panel-title" style="margin-bottom:8px;" data-i18n="spectators">İZLEYİCİLER</div>
          <button id="show-spectators-btn" class="action-btn ghost" style="padding:8px 12px; width:auto; display:none;" data-i18n="show_spectators">İzleyicileri Göster</button>
          <div id="spectator-list" style="display:none;"></div>
        </div>

        <div id="promotion-toggle-row">
          <span id="promotion-toggle-label" data-i18n="allow_join">İzleyici katılımına izin ver</span>
          <label class="toggle-switch">
            <input type="checkbox" id="promotion-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title" data-i18n="room_info">ODA BİLGİSİ</div>
        <div id="room-name" data-i18n="loading">Yükleniyor…</div>
        <div id="room-meta"></div>
        <div id="spectator-count-badge"></div>
        <button class="action-btn ghost" style="margin-top:12px;" onclick="copyLink(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>
          <span class="copy-label" data-i18n="copy_link">Linki Kopyala</span>
        </button>
        <a href="/gallery" class="room-gallery-link" id="room-gallery-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <span data-i18n="gallery_link">GALERİYİ GÖRÜNTÜLE</span>
        </a>
      </div>

      <div class="panel-card" id="chat-card">
        <div class="panel-title" data-i18n="chat">SOHBET</div>
        <div id="chatBox"></div>
        <div id="chat-input-row">
          <input id="chatInput" type="text" data-i18n-ph="chat_ph" maxlength="120" autocomplete="off" />
          <button id="chatSendBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5m0 0-6 6m6-6 6 6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="name-modal">
    <div class="modal-content">
      <h2 data-i18n="join_title">ODAYA KATIL</h2>
      <p data-i18n="join_sub">Oyuna girmek için bir ad belirle</p>
      <input type="text" id="modal-name-input" data-i18n-ph="name_ph2" maxlength="12">
      <button id="modal-join-btn" class="action-btn" style="padding:14px; font-size:15px;" data-i18n="enter_game">Oyuna Gir</button>
    </div>
  </div>

  <div id="slot-toast">
    <span data-i18n="slot_open">Bir yer açıldı! Oyuna katılmak ister misin?</span>
    <div class="toast-actions">
      <button class="toast-btn toast-accept" id="toast-accept-btn" data-i18n="join">Katıl</button>
      <button class="toast-btn toast-decline" id="toast-decline-btn" data-i18n="keep_watching">İzlemeye devam et</button>
    </div>
  </div>
  <button id="mute-btn" title="Mute">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>
  </button>

  <script src="/i18n.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const pathParts = window.location.pathname.split('/');
    const roomKod = pathParts[pathParts.length - 1].toUpperCase();

    // Dinamik tuval boyutu (oda kurarken seçilen 16/32/64'e göre board_state'ten gelir)
    const CANVAS_PX = 576;          // İç çözünürlük (16/32/64'e tam bölünür)
    let BOARD_SIZE = 32;
    let CELL_SIZE = CANVAS_PX / BOARD_SIZE;

    const COOLDOWN = 400;
    const EMPTY_COLOR = '#ffffff';
    // 24 renkli zengin palet
    const COLORS = [
      '#ffffff','#c5cde0','#8b93b8','#4a5078','#222a4a','#0c1024',
      '#ff6b6b','#e63946','#b5121b','#ff9f1c','#f77f00','#ffd166',
      '#06d6a0','#2dc653','#0b7a3e','#43e8d8','#00b4d8','#4361ee',
      '#3a0ca3','#9b5de5','#c14fd6','#f15bb5','#ff8fab','#7f5539'
    ];

    let selectedColor = COLORS[7];
    let eraserActive = false;
    let lastPlaced = 0;
    let cooldownInterval = null;
    let players = {};
    let myId = null;
    let hostId = null;
    let gameState = 'waiting';
    let currentMode = null;
    let isSpectator = false;
    let spectators = {};
    let allowPromotion = true;

    // Küçük SVG ikon yardımcıları (JS ile üretilen içerikler için)
    const ICON_CROWN = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17h18l-1.2-9-4.3 3.2L12 5l-3.5 6.2L4.2 8 3 17Z"/></svg>';
    const ICON_EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
    const ICON_UP = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5m0 0-6 6m6-6 6 6"/></svg>';

    // =====================
    // SOUND ENGINE
    // =====================
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playPixelClick() {
      if (isMuted) return;
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.06);
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.08);
    }
    function playCountdownWarning() {
      if (isMuted) return;
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square'; osc.frequency.setValueAtTime(440, ctx.currentTime);
      gain.gain.setValueAtTime(0.06, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
    }
    function playGameEnd() {
      if (isMuted) return;
      const ctx = getAudioCtx();
      [523, 659, 784].forEach((freq, i) => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, ctx.currentTime);
        const start = ctx.currentTime + i * 0.15;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.12, start + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
        osc.start(start); osc.stop(start + 0.4);
      });
    }
    function playPlayerJoined() {
      if (isMuted) return;
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.07, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
    }
    let isMuted = false;
    const muteBtn = document.getElementById('mute-btn');
    const ICON_VOL_ON = muteBtn.innerHTML;
    const ICON_VOL_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="m23 9-6 6m0-6 6 6"/></svg>';
    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      muteBtn.innerHTML = isMuted ? ICON_VOL_OFF : ICON_VOL_ON;
    });
    // =====================

    // Pan & zoom state
    let canvasScale = 1, canvasTranslateX = 0, canvasTranslateY = 0;
    let pinchStartDist = 0, pinchStartScale = 1, pinchContentX = 0, pinchContentY = 0;
    let panStartX = 0, panStartY = 0, panStartTX = 0, panStartTY = 0, touchMoved = false;
    const MIN_SCALE = 1, MAX_SCALE = 8, MOVE_THRESHOLD = 10;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hoverCursor = document.getElementById('hover-cursor');
    const canvasPan = document.getElementById('canvas-pan');
    canvas.width = CANVAS_PX;
    canvas.height = CANVAS_PX;

    const socket = io();

    const nameModal = document.getElementById('name-modal');
    const modalNameInput = document.getElementById('modal-name-input');
    const modalJoinBtn = document.getElementById('modal-join-btn');

    socket.on('connect', () => {
      myId = socket.id;
      const playerName = localStorage.getItem('gredartName');
      const sessionToken = localStorage.getItem('gredartSession_' + roomKod);

      if (!playerName) {
        nameModal.style.display = 'flex';
        modalNameInput.focus();
        const doJoin = () => {
          const val = modalNameInput.value.trim().toUpperCase();
          if (!val) return;
          localStorage.setItem('gredartName', val);
          nameModal.style.display = 'none';
          socket.emit('join_room', { kod: roomKod, name: val, token: sessionToken });
        };
        modalJoinBtn.addEventListener('click', doJoin);
        modalNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });
      } else {
        socket.emit('join_room', { kod: roomKod, name: playerName, token: sessionToken });
      }
    });

    socket.on('session_token', (token) => { localStorage.setItem('gredartSession_' + roomKod, token); });
    socket.on('room_error', (msg) => { alert(msg); window.location.replace('/'); });

    const gameMessageEl = document.getElementById('game-message');
    const gameTimerEl = document.getElementById('game-timer');
    const hostTopControls = document.getElementById('host-top-controls');
    const hostFinishControls = document.getElementById('host-finish-controls');
    const endTopControls = document.getElementById('end-top-controls');
    const replayBtn = document.getElementById('replay-btn');
    const canvasLock = document.getElementById('canvas-lock-overlay');
    const cdStatusEl = document.getElementById('cooldown-status');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const boardSection = document.getElementById('board-section');
    const spectatorSection = document.getElementById('spectators-section');
    const showSpectatorsBtn = document.getElementById('show-spectators-btn');
    const spectatorList = document.getElementById('spectator-list');

    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        boardSection.requestFullscreen().catch(err => console.log(`Fullscreen: ${err.message}`));
      } else {
        document.exitFullscreen();
      }
    });

    function updateUIBasedOnState() {
      hostTopControls.style.display = 'none';
      endTopControls.style.display = 'none';
      gameTimerEl.style.display = (gameState === 'playing' && currentMode === 'timed') ? 'block' : 'none';
      canvasLock.style.display = (gameState === 'playing') ? 'none' : 'block';
      if (isSpectator) { canvasLock.style.display = 'block'; return; }
      if (gameState === 'waiting') {
        cdStatusEl.textContent = t('locked'); cdStatusEl.style.color = 'var(--danger)';
        hostFinishControls.style.display = 'none';
        if (myId === hostId) {
          hostTopControls.style.display = 'flex';
          gameMessageEl.textContent = t('choose_mode');
        } else {
          hostTopControls.style.display = 'none';
          gameMessageEl.textContent = t('waiting_host');
        }
      } else if (gameState === 'playing') {
        hostTopControls.style.display = 'none';
        hostFinishControls.style.display = (myId === hostId && currentMode === 'free') ? 'flex' : 'none';
      } else if (gameState === 'finished') {
        hostFinishControls.style.display = 'none';
        endTopControls.style.display = 'flex';
        replayBtn.style.display = (myId === hostId) ? 'block' : 'none';
      }
    }

    function setWordMessage(mode, word) {
      gameMessageEl.innerHTML = (mode === 'free')
        ? `<span id="game-word-highlight">${t('free_mode')}</span>`
        : `${t('word')}: <span id="game-word-highlight"></span>`;
      if (mode !== 'free') gameMessageEl.querySelector('#game-word-highlight').textContent = word;
    }

    socket.on('room_info', (data) => {
      hostId = data.hostId;
      gameState = data.status;
      currentMode = data.mode;
      document.getElementById('room-name').textContent = t('room_label') + ': ' + data.kod;
      if (data.status === 'playing') {
        setWordMessage(data.mode, data.word);
        if (data.mode === 'timed') updateTimer(data.timeLeft);
        cdStatusEl.textContent = t('ready'); cdStatusEl.style.color = 'var(--accent-2)';
      }
      updateUIBasedOnState();
    });

    socket.on('game_started', (data) => {
      gameState = 'playing';
      currentMode = data.mode;
      setWordMessage(data.mode, data.word);
      if (data.mode === 'timed') updateTimer(data.timeLeft);
      cdStatusEl.textContent = t('ready'); cdStatusEl.style.color = 'var(--accent-2)';
      updateUIBasedOnState();
    });

    socket.on('time_update', (timeLeft) => { updateTimer(timeLeft); if (timeLeft <= 10 && timeLeft > 0) playCountdownWarning(); });

    socket.on('game_ended', () => {
      playGameEnd();
      gameState = 'finished';
      gameMessageEl.innerHTML = `<span style="color:var(--danger);font-weight:700;">${t('time_up')}</span> ${t('saved')}`;
      gameTimerEl.style.display = 'none';
      cdStatusEl.textContent = t('locked'); cdStatusEl.style.color = 'var(--danger)';
      updateUIBasedOnState();
    });

    socket.on('room_reset', () => { gameState = 'waiting'; currentMode = null; updateUIBasedOnState(); });

    socket.on('joined_as_spectator', () => {
      isSpectator = true;
      document.getElementById('spectator-banner').style.display = 'flex';
      document.getElementById('canvas-lock-overlay').style.display = 'block';
      document.getElementById('palette').style.opacity = '0.3';
      document.getElementById('palette').style.pointerEvents = 'none';
      document.getElementById('host-top-controls').style.display = 'none';
    });
    socket.on('spectator_promotion_toggled', (allowed) => {
      allowPromotion = allowed;
      const toggle = document.getElementById('promotion-toggle');
      if (toggle) toggle.checked = allowed;
    });

    showSpectatorsBtn.addEventListener('click', () => {
      if (spectatorList.style.display === 'block') {
        spectatorList.style.display = 'none';
        showSpectatorsBtn.textContent = t('show_spectators');
        return;
      }
      socket.emit('request_spectator_list');
    });

    socket.on('spectator_list', (data) => {
      spectators = data;
      renderSpectators();
      spectatorList.style.display = 'block';
      showSpectatorsBtn.textContent = t('hide_spectators');
    });

    socket.on('promotion_denied', () => {
      slotToast.classList.remove('visible');
      const badge = document.getElementById('spectator-count-badge');
      const prev = badge.textContent;
      badge.textContent = t('promotion_denied');
      setTimeout(() => badge.textContent = prev, 3000);
    });

    const slotToast = document.getElementById('slot-toast');
    let slotToastTimer = null;

    socket.on('slot_available', () => {
      if (!isSpectator) return;
      slotToast.classList.add('visible');
      slotToastTimer = setTimeout(() => { slotToast.classList.remove('visible'); }, 15000);
    });

    socket.on('slot_gone', () => {
      slotToast.classList.remove('visible');
      const badge = document.getElementById('spectator-count-badge');
      const prev = badge.textContent;
      badge.textContent = t('slot_gone');
      setTimeout(() => badge.textContent = prev, 3000);
    });

    socket.on('promoted_to_player', ({ avatarColor }) => {
      isSpectator = false;
      slotToast.classList.remove('visible');
      if (slotToastTimer) clearTimeout(slotToastTimer);
      document.getElementById('spectator-banner').style.display = 'none';
      document.getElementById('palette').style.opacity = '1';
      document.getElementById('palette').style.pointerEvents = 'auto';
      updateUIBasedOnState();
    });

    document.getElementById('toast-accept-btn').addEventListener('click', () => { socket.emit('claim_slot'); });
    document.getElementById('toast-decline-btn').addEventListener('click', () => {
      slotToast.classList.remove('visible');
      if (slotToastTimer) clearTimeout(slotToastTimer);
    });
    document.getElementById('promotion-toggle').addEventListener('change', () => { socket.emit('toggle_spectator_promotion'); });

    socket.on('spectator_count', (count) => {
      const badge = document.getElementById('spectator-count-badge');
      const isHost = myId === hostId;
      badge.textContent = count > 0 ? `${count} ${t('spectator_count')}` : '';
      showSpectatorsBtn.style.display = isHost && count > 0 ? 'block' : 'none';
      spectatorSection.style.display = isHost && count > 0 ? 'block' : 'none';
      if (!isHost || count === 0) {
        spectatorList.style.display = 'none';
        showSpectatorsBtn.textContent = t('show_spectators');
      }
    });

    socket.on('kicked', (msg) => { alert(msg); window.location.replace('/'); });

    function startGame(mode) { socket.emit('start_game', { mode }); }
    function resetRoom() { socket.emit('reset_room'); }
    function finishRoom() { socket.emit('finish_game'); }
    function downloadCanvas() {
      const link = document.createElement('a');
      link.download = `gredart-${roomKod}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
    function updateTimer(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      gameTimerEl.textContent = `${m}:${s}`;
    }

    // Tuvali gelen tablonun boyutuna göre yapılandır
    function configureBoard(size) {
      if (size === BOARD_SIZE) return;
      BOARD_SIZE = size;
      CELL_SIZE = CANVAS_PX / size;
    }

    socket.on('board_state', (board) => {
      configureBoard(board.length);
      document.getElementById('room-meta').textContent = `${BOARD_SIZE}×${BOARD_SIZE}`;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let y = 0; y < BOARD_SIZE; y++) for (let x = 0; x < BOARD_SIZE; x++) drawCell(x, y, board[y][x]);
    });
    socket.on('pixel_placed', ({ x, y, color }) => drawCell(x, y, color));

    let prevPlayerCount = 0;
    socket.on('players_update', (data) => {
      const newCount = Object.keys(data).length;
      if (newCount > prevPlayerCount && prevPlayerCount > 0) playPlayerJoined();
      prevPlayerCount = newCount;
      players = data;
      renderPlayers();
    });

    function handleDraw(clientX, clientY) {
      if (isSpectator) return;
      if (gameState !== 'playing') return;
      const now = Date.now();
      if (now - lastPlaced < COOLDOWN) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = Math.floor(((clientX - rect.left) * scaleX) / CELL_SIZE);
      const y = Math.floor(((clientY - rect.top) * scaleY) / CELL_SIZE);
      if (x < 0 || x >= BOARD_SIZE || y < 0 || y >= BOARD_SIZE) return;
      const color = eraserActive ? EMPTY_COLOR : selectedColor;
      lastPlaced = now;
      socket.emit('place_pixel', { x, y, color });
      playPixelClick();
      startCooldown();
    }

    const canvasWrapper = document.getElementById('canvas-wrapper');
    const zoomResetBtn = document.getElementById('zoom-reset');
    const zoomInBtn = document.getElementById('zoom-in');

    function getTouchDist(t1, t2) { return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY); }

    // Tuvali görüntü alanı (viewport) içinde tut — dışarı fırlamayı engeller.
    function clampTranslate() {
      const vp = canvasWrapper.clientWidth;
      const minT = vp - vp * canvasScale; // <= 0
      canvasTranslateX = Math.min(0, Math.max(minT, canvasTranslateX));
      canvasTranslateY = Math.min(0, Math.max(minT, canvasTranslateY));
      if (canvasScale <= 1.0001) { canvasTranslateX = 0; canvasTranslateY = 0; }
    }
    function applyCanvasTransform() {
      clampTranslate();
      canvasPan.style.transform = `translate(${canvasTranslateX}px, ${canvasTranslateY}px) scale(${canvasScale})`;
      zoomResetBtn.style.display = canvasScale > 1.0001 ? 'flex' : 'none';
    }
    // (focalX, focalY) ekran noktasını sabit tutarak yakınlaştır.
    function setZoom(newScale, focalX, focalY) {
      newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
      const rect = canvasWrapper.getBoundingClientRect();
      const fx = focalX - rect.left, fy = focalY - rect.top;
      const cx = (fx - canvasTranslateX) / canvasScale;
      const cy = (fy - canvasTranslateY) / canvasScale;
      canvasScale = newScale;
      canvasTranslateX = fx - cx * newScale;
      canvasTranslateY = fy - cy * newScale;
      applyCanvasTransform();
    }
    function resetZoom() { canvasScale = 1; canvasTranslateX = 0; canvasTranslateY = 0; applyCanvasTransform(); }

    zoomResetBtn.addEventListener('click', resetZoom);
    zoomInBtn.addEventListener('click', () => {
      const rect = canvasWrapper.getBoundingClientRect();
      setZoom(canvasScale * 1.6, rect.left + rect.width / 2, rect.top + rect.height / 2);
    });
    window.addEventListener('resize', applyCanvasTransform);
    document.addEventListener('fullscreenchange', resetZoom);

    // Fare tıklaması ile piksel koy (masaüstü)
    canvas.addEventListener('click', (e) => handleDraw(e.clientX, e.clientY));
    // Masaüstü tekerlek ile yakınlaştırma
    canvasWrapper.addEventListener('wheel', (e) => {
      e.preventDefault();
      setZoom(canvasScale * (e.deltaY < 0 ? 1.15 : 1 / 1.15), e.clientX, e.clientY);
    }, { passive: false });

    const onZoomControls = (e) => e.target.closest && e.target.closest('#zoom-controls');

    canvasWrapper.addEventListener('touchstart', (e) => {
      if (onZoomControls(e)) return;
      if (e.touches.length === 2) {
        e.preventDefault();
        pinchStartDist = getTouchDist(e.touches[0], e.touches[1]);
        pinchStartScale = canvasScale;
        const rect = canvasWrapper.getBoundingClientRect();
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
        pinchContentX = (midX - canvasTranslateX) / canvasScale;
        pinchContentY = (midY - canvasTranslateY) / canvasScale;
        touchMoved = true; // pinch sonrası piksel koyma
      } else if (e.touches.length === 1) {
        e.preventDefault();
        panStartX = e.touches[0].clientX;
        panStartY = e.touches[0].clientY;
        panStartTX = canvasTranslateX;
        panStartTY = canvasTranslateY;
        touchMoved = false;
      }
    }, { passive: false });

    canvasWrapper.addEventListener('touchmove', (e) => {
      if (onZoomControls(e)) return;
      if (e.touches.length === 2) {
        e.preventDefault();
        const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchStartScale * (getTouchDist(e.touches[0], e.touches[1]) / pinchStartDist)));
        const rect = canvasWrapper.getBoundingClientRect();
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
        canvasScale = newScale;
        canvasTranslateX = midX - pinchContentX * newScale;
        canvasTranslateY = midY - pinchContentY * newScale;
        applyCanvasTransform();
      } else if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - panStartX;
        const dy = e.touches[0].clientY - panStartY;
        if (Math.hypot(dx, dy) > MOVE_THRESHOLD) touchMoved = true;
        if (canvasScale > 1.0001) { // yakınlaşmışken tek parmak kaydırır
          e.preventDefault();
          canvasTranslateX = panStartTX + dx;
          canvasTranslateY = panStartTY + dy;
          applyCanvasTransform();
        }
      }
    }, { passive: false });

    // Temiz dokunuş (kaydırma/pinch değil) => piksel koy
    canvasWrapper.addEventListener('touchend', (e) => {
      if (onZoomControls(e)) return;
      if (!touchMoved && e.touches.length === 0 && e.changedTouches.length === 1) {
        e.preventDefault();
        handleDraw(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      }
    }, { passive: false });

    canvas.addEventListener('mousemove', (e) => {
      if (gameState !== 'playing') return;
      const rect = canvas.getBoundingClientRect();
      const cellOnScreen = rect.width / BOARD_SIZE;
      const x = Math.floor((e.clientX - rect.left) / cellOnScreen);
      const y = Math.floor((e.clientY - rect.top) / cellOnScreen);
      if (x < 0 || x >= BOARD_SIZE || y < 0 || y >= BOARD_SIZE) { hoverCursor.style.display = 'none'; return; }
      // hover-cursor dönüştürülen katmanın içinde olduğu için ölçeklenmemiş hücre boyutu kullanılır
      const baseCell = canvas.clientWidth / BOARD_SIZE;
      hoverCursor.style.display = 'block';
      hoverCursor.style.width = baseCell + 'px';
      hoverCursor.style.height = baseCell + 'px';
      hoverCursor.style.left = (x * baseCell) + 'px';
      hoverCursor.style.top = (y * baseCell) + 'px';
      hoverCursor.style.borderColor = eraserActive ? 'rgba(255,255,255,0.6)' : (selectedColor === '#ffffff' ? 'rgba(200,200,200,0.8)' : selectedColor);
      hoverCursor.style.background = eraserActive ? 'rgba(255,255,255,0.15)' : 'transparent';
    });
    canvas.addEventListener('mouseleave', () => { hoverCursor.style.display = 'none'; });

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
      if (color === EMPTY_COLOR) {
        ctx.strokeStyle = 'rgba(100,110,160,0.22)'; ctx.lineWidth = 1;
        ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
      }
    }
    for (let y = 0; y < BOARD_SIZE; y++) for (let x = 0; x < BOARD_SIZE; x++) drawCell(x, y, EMPTY_COLOR);

    function startCooldown() {
      const statusEl = document.getElementById('cooldown-status');
      const timerEl = document.getElementById('cooldown-timer-text');
      const bar = document.getElementById('cooldown-bar');
      let elapsed = 0;
      if (cooldownInterval) clearInterval(cooldownInterval);
      cooldownInterval = setInterval(() => {
        elapsed += 50;
        bar.style.width = Math.min((elapsed / COOLDOWN) * 100, 100) + '%';
        if (elapsed >= COOLDOWN) {
          clearInterval(cooldownInterval); bar.style.width = '0%';
          statusEl.textContent = t('ready'); statusEl.style.color = 'var(--accent-2)'; timerEl.textContent = '';
        } else {
          statusEl.textContent = t('wait'); statusEl.style.color = '#f093fb';
          timerEl.textContent = ((COOLDOWN - elapsed) / 1000).toFixed(1) + 's';
        }
      }, 50);
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
    }
    function renderPlayers() {
      const list = document.getElementById('players-list'); list.innerHTML = '';
      const sorted = Object.values(players).sort((a, b) => b.pixels - a.pixels);
      const maxPixels = Math.max(sorted[0]?.pixels || 1, 1);
      sorted.forEach(p => {
        const isMe = p.id === myId; const isHost = p.id === hostId;
        const safeName = escapeHTML(p.name);
        const kickBtn = (myId === hostId && !isMe) ? `<button onclick="kickPlayer('${p.id}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-weight:bold;font-size:14px;">✕</button>` : '';
        const crown = isHost ? `<span class="host-badge">${ICON_CROWN}</span>` : '';
        const row = document.createElement('div'); row.className = 'player-row';
        row.innerHTML = `<div class="player-avatar" style="background:${p.avatarColor};">${safeName[0]}</div>
          <div class="player-info"><div class="player-name"><span>${safeName}${crown}${isMe ? `<small style="color:var(--accent);font-size:10px;"> (${t('you')})</small>` : ''}</span>${kickBtn}</div>
          <div class="player-pixels">${p.pixels} ${t('pixels_unit')}</div><div class="player-bar-bg"><div class="player-bar" style="width:${(p.pixels/maxPixels)*100}%;background:${p.avatarColor}"></div></div></div>`;
        list.appendChild(row);
      });
    }
    function renderSpectators() {
      const list = document.getElementById('spectator-list');
      const toggleRow = document.getElementById('promotion-toggle-row');
      list.innerHTML = '';
      const spectatorListItems = Object.values(spectators);
      toggleRow.style.display = myId === hostId ? 'flex' : 'none';
      spectatorListItems.forEach(s => {
        const row = document.createElement('div');
        row.className = 'spectator-row';
        const promoteBtn = (myId === hostId && Object.keys(players).length < 6)
          ? `<button class="promote-btn" onclick="promoteSpectator('${s.id}')">${ICON_UP}${t('make_player')}</button>`
          : '';
        row.innerHTML = `<div class="spectator-name">${ICON_EYE}<span>${escapeHTML(s.name)}</span></div>${promoteBtn}`;
        list.appendChild(row);
      });
    }
    function promoteSpectator(targetId) { socket.emit('promote_spectator', targetId); }
    function kickPlayer(targetId) { if (confirm(t('confirm_kick'))) socket.emit('kick_player', targetId); }

    const palette = document.getElementById('palette');
    COLORS.forEach(color => {
      const btn = document.createElement('div');
      btn.className = 'color-btn' + (color === selectedColor ? ' selected' : ''); btn.style.background = color;
      if (color === '#ffffff') btn.style.boxShadow = '0 0 0 1px #555 inset';
      btn.addEventListener('click', () => {
        eraserActive = false;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('eraser-btn').classList.remove('selected');
        btn.classList.add('selected'); selectedColor = color;
      });
      palette.appendChild(btn);
    });
    const eraserBtn = document.createElement('div'); eraserBtn.id = 'eraser-btn';
    eraserBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 5 5L8 21H3v-5L16 3Z"/><path d="m12.5 6.5 5 5"/></svg>';
    eraserBtn.addEventListener('click', () => {
      eraserActive = !eraserActive; eraserBtn.classList.toggle('selected', eraserActive);
      if (eraserActive) document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
    });
    palette.appendChild(eraserBtn);

    function copyLink(btn) {
      navigator.clipboard.writeText(window.location.href);
      const label = btn.querySelector('.copy-label');
      const prev = label.textContent;
      label.textContent = t('copied');
      setTimeout(() => label.textContent = t('copy_link'), 2000);
    }

    // Galeriyi yeni sekmede aç (odayı kaybetmeden); ?from ile oda kodunu taşı ki
    // galeride "Odaya Dön" çıksın ve sekmeyi kapatınca oda sekmesine dönülsün.
    document.getElementById('room-gallery-link').addEventListener('click', (e) => {
      e.preventDefault();
      window.open('/gallery?from=' + roomKod, 'gredart_gallery');
    });

    const MAX_CHAT_MESSAGES = 50;
    function sendMessage() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      socket.emit('send_message', msg);
      input.value = '';
    }
    document.getElementById('chatSendBtn').addEventListener('click', sendMessage);
    document.getElementById('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

    socket.on('receive_message', (data) => {
      const box = document.getElementById('chatBox');
      const isMe = data.name === (players[myId]?.name);
      const div = document.createElement('div');
      div.className = 'chat-msg' + (isMe ? ' mine' : '');
      const nameSpan = document.createElement('span');
      nameSpan.className = 'chat-name';
      nameSpan.textContent = data.name + ':';
      const msgSpan = document.createElement('span');
      msgSpan.textContent = data.message;
      div.appendChild(nameSpan); div.appendChild(msgSpan);
      box.appendChild(div);
      while (box.children.length > MAX_CHAT_MESSAGES) box.removeChild(box.firstChild);
      box.scrollTop = box.scrollHeight;
    });
  </script>
</body>
</html>
