<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GredArt - Galeri</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1b1f3b;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .header { text-align: center; }
    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 10px;
      background: linear-gradient(135deg, #43e8d8, #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline { font-size: 12px; color: #4ade80; letter-spacing: 3px; opacity: 0.7; margin-top: 6px; }

    .back-btn {
      background: #252a4a;
      color: #43e8d8;
      border: 1px solid #2e3460;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #2e3460; }

    #gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1000px;
    }

    .gallery-card {
      background: #252a4a;
      border: 1px solid #2e3460;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s;
    }
    .gallery-card:hover { transform: translateY(-4px); border-color: #43e8d8; }

    .gallery-card canvas {
      width: 100%;
      display: block;
      image-rendering: pixelated;
    }

    .card-meta {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .card-room { font-size: 13px; font-weight: 700; color: #e2e8f0; letter-spacing: 1px; }
    .card-date { font-size: 11px; color: #6b7280; }

    #empty-state {
      color: #6b7280;
      font-size: 14px;
      text-align: center;
      margin-top: 60px;
      display: none;
    }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(27, 31, 59, 0.9);
      backdrop-filter: blur(6px);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    #modal-overlay.open { display: flex; }

    #modal-box {
      background: #252a4a;
      border: 1px solid #43e8d8;
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 480px;
      width: 100%;
    }

    #modal-canvas {
      width: 100%;
      max-width: 384px;
      image-rendering: pixelated;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    #modal-meta { text-align: center; }
    #modal-room { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 2px; }
    #modal-date { font-size: 12px; color: #6b7280; margin-top: 4px; }

    .modal-actions { display: flex; gap: 10px; }
    .modal-btn {
      background: #2e3460;
      color: #43e8d8;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .modal-btn:hover { background: #3a4270; }
    .modal-btn.primary { background: linear-gradient(135deg, #43e8d8, #4ade80); color: #1b1f3b; }
    .modal-btn.primary:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="header">
    <h1>GredArt</h1>
    <div class="tagline">GALERİ</div>
  </div>

  <a href="/" class="back-btn">← Ana Sayfa</a>

  <div id="gallery-grid"></div>
  <div id="empty-state">Henüz kaydedilmiş eser yok.<br>Süreli mod oynayarak ilk eseri sen ekle!</div>

  <div id="modal-overlay">
    <div id="modal-box">
      <canvas id="modal-canvas" width="32" height="32"></canvas>
      <div id="modal-meta">
        <div id="modal-room"></div>
        <div id="modal-date"></div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn" onclick="closeModal()">✕ Kapat</button>
        <button class="modal-btn primary" id="modal-download-btn">🖼️ İndir</button>
      </div>
    </div>
  </div>

  <script>
    const BOARD_SIZE = 32;

    function drawBoard(canvas, board) {
      const ctx = canvas.getContext('2d');
      canvas.width = BOARD_SIZE;
      canvas.height = BOARD_SIZE;
      for (let y = 0; y < BOARD_SIZE; y++) {
        for (let x = 0; x < BOARD_SIZE; x++) {
          ctx.fillStyle = board[y][x] || '#ffffff';
          ctx.fillRect(x, y, 1, 1);
        }
      }
    }

    function formatDate(str) {
      if (!str) return '';
      const d = new Date(str);
      return d.toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function loadGallery() {
      const res = await fetch('/api/gallery');
      const items = await res.json();

      const grid = document.getElementById('gallery-grid');
      const empty = document.getElementById('empty-state');

      if (!items.length) { empty.style.display = 'block'; return; }

      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'gallery-card';

        const canvas = document.createElement('canvas');
        canvas.width = BOARD_SIZE;
        canvas.height = BOARD_SIZE;

        const meta = document.createElement('div');
        meta.className = 'card-meta';
        meta.innerHTML = `
          <div class="card-room">ODA: ${item.roomCode}</div>
          <div class="card-date">${formatDate(item.createdAt)}</div>
        `;

        card.appendChild(canvas);
        card.appendChild(meta);
        grid.appendChild(card);

        // Load full board data on click
        card.addEventListener('click', () => openModal(item.id));

        // Load thumbnail lazily
        fetch('/api/gallery/' + item.id)
          .then(r => r.json())
          .then(data => drawBoard(canvas, data.board));
      });
    }

    let currentModalId = null;
    let currentModalBoard = null;

    async function openModal(id) {
      const res = await fetch('/api/gallery/' + id);
      const data = await res.json();

      currentModalId = id;
      currentModalBoard = data.board;

      const modalCanvas = document.getElementById('modal-canvas');
      drawBoard(modalCanvas, data.board);

      document.getElementById('modal-room').textContent = 'ODA: ' + data.roomCode;
      document.getElementById('modal-date').textContent = formatDate(data.createdAt);

      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      currentModalId = null;
      currentModalBoard = null;
    }

    document.getElementById('modal-download-btn').addEventListener('click', () => {
      if (!currentModalBoard) return;
      // Draw at 10x resolution for a crisp download
      const offscreen = document.createElement('canvas');
      offscreen.width = BOARD_SIZE * 10;
      offscreen.height = BOARD_SIZE * 10;
      const ctx = offscreen.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      for (let y = 0; y < BOARD_SIZE; y++) {
        for (let x = 0; x < BOARD_SIZE; x++) {
          ctx.fillStyle = currentModalBoard[y][x] || '#ffffff';
          ctx.fillRect(x * 10, y * 10, 10, 10);
        }
      }
      const link = document.createElement('a');
      link.download = `gredart-${currentModalId}.png`;
      link.href = offscreen.toDataURL('image/png');
      link.click();
    });

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    // Close modal on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    loadGallery();
  </script>
</body>
</html>
